services:
  app:
    build:
      context: .
    container_name: polla-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - storage-data:/var/www/html/storage
      - ./deploy/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-polla}
      DB_USERNAME: ${DB_USERNAME:-polla}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      REDIS_PORT: ${REDIS_PORT:-6379}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - polla-network

  nginx:
    image: nginx:alpine
    container_name: polla-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - polla-network

  db:
    image: mysql:8.0
    container_name: polla-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-polla}
      MYSQL_USER: ${DB_USERNAME:-polla}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - polla-network

  redis:
    image: redis:7-alpine
    container_name: polla-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - polla-network

volumes:
  mysql-data:
  redis-data:
  storage-data:

networks:
  polla-network:
    driver: bridge
